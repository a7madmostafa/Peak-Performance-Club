{% extends "base.html" %}

{% block content %}
    <h1>Branches</h1>
    <ul>
        {% if not branches %} 
            <li>No branches found</li> 
        {% endif %}
        
        {% for branch in branches %}
            <li>{{ branch.name }} - {{ branch.location }} - {{ branch.contact }}</li>
        {% endfor %}
    </ul>
{% endblock %}
