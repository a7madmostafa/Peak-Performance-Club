<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Gym System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8fafc;
        }

        .nav-link {
            color: white !important;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">🏋️ Peak Performance Club</a>

    <div class="d-flex gap-3">
        <a class="nav-link text-white" href="/">Home</a>
        <a class="nav-link text-white" href="/members/">Members</a>
        <a class="nav-link text-white" href="/trainers/">Trainers</a>
        <a class="nav-link text-white" href="/classes/">Classes</a>
        <a class="nav-link text-white" href="/branches/">Branches</a>
        <a class="nav-link text-white" href="/equipments/">Equipments</a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container py-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
