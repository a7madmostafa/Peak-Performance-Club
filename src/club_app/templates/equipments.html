{% extends "base.html" %}

{% block title %}Equipments{% endblock %}

{% block content %}

<h2>🏋️ Equipments</h2>
<hr>
<div class="row g-3 mt-2">

    {% for e in equipments %}
    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h5>{{ e.name }}</h5>
            <p>🏢 {{ e.branch.name }}</p>
            <p>💰 {{ e.price }}</p>
            <p>
                {% if e.is_damaged %}
                    ❌ Damaged
                {% else %}
                    ✅ Working
                {% endif %}
            </p>
        </div>
    </div>
    {% endfor %}

</div>

{% endblock %}
